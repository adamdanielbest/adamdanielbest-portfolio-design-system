<body>

  <!-- Icon sprite — required for any SVG icon usage -->
  <script>
    fetch('../../src/icons/sprite.svg')
      .then(r => r.text())
      .then(svg => {
        const div = document.createElement('div');
        div.style.display = 'none';
        div.setAttribute('aria-hidden', 'true');
        div.innerHTML = svg;
        document.body.insertBefore(div, document.body.firstChild);
      });
  </script>

  <div class="container">

    <header class="page-header">
      <h1>[Component name]</h1>
      <hr class="page-header__divider">
      <p class="breadcrumb">adamdanielbest.com · [Category] · [Component name]</p>
      <p class="meta">Font-family: Eina04 · Units: 4px base unit · v1.0 · Updated <span class="meta-date"></span></p>
      <p class="usage">[One-line description of what this component is and when to use it]</p>
    </header>

    <!-- =====================================================================
         Component content goes here
         ===================================================================== -->

  </div><!-- /.container -->

  <!-- Dynamic date -->
  <script>
    document.querySelectorAll('.meta-date').forEach(el => {
      el.textContent = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    });
  </script>

</body>
