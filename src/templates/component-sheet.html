<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[Category] – [Component] – adamdanielbest Design System</title>

  <!-- Tokens — order matters: primitives → semantic colour → dimensions -->
  <link rel="stylesheet" href="../../src/styles/generated/tokens-primitives.css">
  <link rel="stylesheet" href="../../src/styles/generated/tokens-light.css">
  <link rel="stylesheet" href="../../src/styles/generated/tokens-dark.css">
  <link rel="stylesheet" href="../../src/styles/generated/tokens-desktop.css">
  <link rel="stylesheet" href="../../src/styles/generated/tokens-mobile.css">

  <!-- Shared utilities -->
  <link rel="stylesheet" href="../../src/styles/layout.css">
  <link rel="stylesheet" href="../../src/styles/sheet.css">

  <!-- Component styles — add your component CSS file here -->
  <!-- <link rel="stylesheet" href="../[component].css"> -->
</head>
<body>

  <!-- Icon sprite — required for any SVG icon usage -->
  <script>
    fetch('../../src/icons/sprite.svg')
      .then(r => r.text())
      .then(svg => {
        const div = document.createElement('div');
        div.style.display = 'none';
        div.setAttribute('aria-hidden', 'true');
        div.innerHTML = svg;
        document.body.insertBefore(div, document.body.firstChild);
      });
  </script>

  <div class="container">

    <header class="page-header">
      <h1 title="[Component name]">[Component name]</h1>
      <hr class="page-header__divider">
      <div class="page-header__metadata">
        <p class="breadcrumb" title="adamdanielbest.com · [Category] · [Component name]">adamdanielbest.com · [Category] · [Component name]</p>
        <p class="meta" title="Font-family: Eina04 · Units: 4px base unit · v1.0 · Updated [date]">Font-family: Eina04 · Units: 4px base unit · v1.0 · Updated <span class="meta-date"></span></p>
        <p class="usage" title="[One-line description of what this component is and when to use it]">[One-line description of what this component is and when to use it]</p>
      </div>
    </header>

    <!-- =====================================================================
         Component content goes here

         RULES:
         - Every text element must have a title attribute matching its text
           content exactly — headings, labels, breadcrumbs, table cells, token
           codes, swatch names, descriptions. No exceptions.
           e.g. <h1 title="Button">Button</h1>
                <p class="swatch__name" title="platinum-grey">platinum-grey</p>
                <td title="--spacing-stack-gap">--spacing-stack-gap</td>
         - img elements must have an alt attribute (empty alt="" if decorative).
         - All fills and strokes must reference a CSS custom property (token).
           Never use hardcoded hex or rgb values.
         - All text must use a named type token via font-family / font-size vars.
         - <code> elements render as block/fit-content by default (sheet.css).
           They hug their content and truncate at the parent boundary —
           ensure the parent has a defined width (flex min-width: 0, or
           table-layout: fixed) for truncation to work correctly.
         ===================================================================== -->

  </div><!-- /.container -->

  <!-- Dynamic date -->
  <script>
    document.querySelectorAll('.meta-date').forEach(el => {
      el.textContent = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    });
  </script>

</body>
</html>
