name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  html-validate:
    name: HTML validity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install html-validate
        run: npm install --save-dev html-validate
      - name: Validate HTML
        # Globs every .html file under any *-component directory at repo root.
        run: npx html-validate "*-component/**/*.html"

  token-refs:
    name: Token reference check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check var() references resolve
        run: python3 scripts/check-token-refs.py
