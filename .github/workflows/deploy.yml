name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Required for the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy runs at a time; skip queued runs but don't cancel in-progress.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Upload the whole repo root. The relative path ../src/styles/generated/
      # from button-component/button.html is preserved because both directories
      # sit at the artifact root, so the published URL structure matches the
      # local file layout exactly.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
